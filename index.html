<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cheese Wizard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <img
      src="images/hero.png"
      alt="Cheese Wizard"
    />
  </main>

  <!-- Cheese trail follows the cursor (mouse-only devices) -->
  <script>
    if (window.matchMedia('(hover: hover) and (pointer: fine)').matches) {
    const CHEESES = ['🧀', '🧀', '🧀', '🫕', '🍕'];
    let lastX = null, lastY = null;

    document.addEventListener('mousemove', (e) => {
      const dx = lastX !== null ? Math.abs(e.clientX - lastX) : 999;
      const dy = lastY !== null ? Math.abs(e.clientY - lastY) : 999;
      if (dx < 24 && dy < 24) return;

      lastX = e.clientX;
      lastY = e.clientY;

      const el = document.createElement('span');
      el.className = 'cheese-crumb';
      el.textContent = CHEESES[Math.floor(Math.random() * CHEESES.length)];

      const size = 14 + Math.random() * 18;
      const driftX = (Math.random() - 0.5) * 30;
      const rotation = (Math.random() - 0.5) * 60;

      el.style.cssText = `
        left: ${e.clientX}px;
        top: ${e.clientY}px;
        font-size: ${size}px;
        --drift-x: ${driftX}px;
        --rotation: ${rotation}deg;
      `;

      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    });
    } // end hover check
  </script>

  <!-- Mouse peeks out of a random hole, looks around, disappears, repeats -->
  <script>
    (function () {
      const DURATION = 3500;
      const MIN_GAP  = 3000;
      const MAX_GAP  = 6000;
      let peekTimer  = null;

      function schedule(delay) {
        clearTimeout(peekTimer);
        peekTimer = setTimeout(peek, delay);
      }

      function swipeNet(x, y) {
        const net = document.createElement('div');
        net.className = 'swipe-net';
        net.innerHTML = '<div class="swipe-net-mesh"></div><div class="swipe-net-handle"></div>';
        const dir = Math.random() > 0.5 ? 1 : -1;
        net.style.cssText = `left:${x}px; top:${y}px; --dir:${dir};`;
        document.body.appendChild(net);
        setTimeout(() => net.remove(), 700);
      }

      function peek() {
        const img  = document.querySelector('main img');
        const rect = img ? img.getBoundingClientRect() : { left: 0, top: 0, width: window.innerWidth, height: window.innerHeight };
        const margin = 30;
        const x = rect.left + margin + Math.random() * (rect.width  - margin * 2);
        const y = rect.top  + margin + Math.random() * (rect.height - margin * 2);
        const r = () => (38 + Math.random() * 24) | 0;

        const hole = document.createElement('div');
        hole.className = 'peek-hole';
        hole.style.cssText = `left:${x}px; top:${y}px;
          border-radius:${r()}% ${r()}% ${r()}% ${r()}% / ${r()}% ${r()}% ${r()}% ${r()}%;`;
        document.body.appendChild(hole);

        const fontSize = 44 + Math.random() * 44;
        const mouse = document.createElement('div');
        mouse.className = 'peek-mouse';
        mouse.textContent = '🐭';
        mouse.style.cssText = `left:${x}px; top:${y}px; font-size:${fontSize}px;`;
        document.body.appendChild(mouse);

        let done = false;
        const autoCleanup = setTimeout(() => {
          done = true;
          hole.remove();
          mouse.remove();
          schedule(MIN_GAP + Math.random() * (MAX_GAP - MIN_GAP));
        }, DURATION + 100);

        mouse.addEventListener('click', () => {
          if (done) return;
          done = true;
          clearTimeout(autoCleanup);

          swipeNet(x, y);

          // Mouse ducks away scared
          mouse.style.transition = 'opacity 0.2s ease';
          hole.style.transition  = 'opacity 0.25s ease';
          mouse.style.opacity = '0';
          hole.style.opacity  = '0';
          setTimeout(() => { mouse.remove(); hole.remove(); }, 300);

          // Spooked but curious — reappears sooner
          schedule(1200 + Math.random() * 1500);
        });
      }

      schedule(1200);
    })();
  </script>
  <!-- Toasted cheese facts -->
  <script>
    (function () {
      const FACTS = [
        "Cheese is the most stolen food in the world. 4% of all cheese produced globally is stolen each year. Cheese criminals walk among us.",
        "Casu martzu is a Sardinian cheese intentionally infested with live maggots. The maggots can jump 6 inches when disturbed. It is technically illegal. It is also considered a delicacy.",
        "A 3,200-year-old cheese was discovered in an Egyptian tomb in 2018. Scientists confirmed it was once edible. They did not confirm whether anyone tried it.",
        "Mice don't actually prefer cheese. Studies show they prefer sweet foods. Every cartoon has lied to you.",
        "The holes in Swiss cheese are officially called 'eyes.' Swiss cheese with no holes is called 'blind cheese.' This feels deeply ominous.",
        "An Italian bank — Credito Emiliano — accepts wheels of Parmigiano-Reggiano as loan collateral. They store thousands of wheels in climate-controlled vaults. Cheese heists have been attempted.",
        "Casein, a protein in cheese, breaks down into compounds that bind to the same opioid receptors as morphine. Cheese is, very mildly, a drug.",
        "Époisses de Bourgogne is so powerfully pungent it is banned on French public transportation. Napoleon Bonaparte was reportedly obsessed with it.",
        "France has over 1,600 varieties of cheese. De Gaulle once asked, 'How can you govern a country with 246 kinds of cheese?' The number has since grown considerably.",
        "Kraft Singles cannot legally be called 'cheese.' They must be labeled 'pasteurized prepared cheese product.' There is an entire regulatory category for things pretending to be cheese.",
        "The phrase 'the moon is made of green cheese' dates to 1546. 'Green' meant 'fresh' — not the color. This is still incorrect but slightly less absurd.",
        "Turophobia is the documented fear of cheese. Symptoms include anxiety around cheese boards and an inability to enjoy fondue.",
        "Swiss cheese holes have been shrinking since the 1950s. Scientists found they were caused by tiny hay particles falling into milk. Modern hygienic dairy practices removed the hay. Cleaner barns = fewer holes. Progress is complicated.",
        "The British Cheese Board conducted a study finding cheese before bed causes vivid and unusual dreams. Blue cheese produced the most bizarre results. This was real peer-reviewed research.",
        "The word 'salary' derives from Latin for salt payment — Romans were paid partly in salt. Cheese was also distributed as rations but left absolutely no linguistic legacy. The greatest injustice in etymology.",
        "Swiss cheese fondue was not a folk tradition. It was invented as a 1930s marketing campaign by the Swiss Cheese Union to sell more cheese. It worked flawlessly.",
        "The Swiss Cheese Union later became one of history's strangest financial scandals — embezzling millions to fund lavish global 'cheese diplomacy' parties for politicians throughout the 1980s. Multiple executives were imprisoned.",
        "Babybel wax is food-safe and entirely edible. The company confirmed this when enough people asked. What you do with this information is between you and your conscience.",
        "Natural cheddar is white. The orange color is artificial dye added since the 17th century to signal higher butterfat content. The tradition outlived its meaning. You have been eating dyed cheese your whole life.",
        "The bacteria responsible for Limburger's infamous smell — Brevibacterium linens — is the same species responsible for human foot odor. They are literally the same microorganism. You're welcome.",
        "String cheese is mozzarella heated to exactly 140°F, aligning its proteins into parallel strands. Biting it instead of peeling it is technically incorrect. There is no law against this.",
        "Every year, people chase a wheel of Double Gloucester down a near-vertical hill in Cooper's Hill, England. The cheese reaches ~70 mph. No human has ever kept pace. The cheese always wins.",
        "An aged wheel of Parmigiano-Reggiano can cost over $1,000. The rind is edible and traditionally added to Italian soups. Italians will silently respect you if you eat it plain.",
        "It takes roughly 10 lbs of milk to produce 1 lb of cheese. A single wheel of Parmigiano-Reggiano requires the equivalent of one cow's annual milk output. Parmigiano does not cut corners.",
        "The record for the world's longest grilled cheese sandwich is 53.8 meters, set in 2014. It required 25 lbs of cheese. It was consumed afterward. As it should be.",
        "Cheese was used as currency in 14th-century France. Tax collectors in some regions accepted it in lieu of coin. Camembert has never been this powerful since.",
        "The smell of aged cheese activates the same brain reward centers as financial gain. Your brain cannot meaningfully distinguish between smelling Gruyère and winning money. Invest accordingly.",
        "Roquefort-sur-Soulzon, population ~600, produces roughly 3 million wheels of Roquefort per year. That is approximately 5,000 wheels per resident. Every person in that village is, statistically, mostly cheese.",
        "There is a competitive cheese-carving circuit in which artists sculpt elaborate scenes from giant blocks of cheddar. Past subjects include the Sistine Chapel and a full-size Ford pickup truck. Both were eventually eaten.",
        "Cheese is the only food in many countries legally labeled 'natural' while containing artificial coloring. It exists in a special regulatory dimension where the rules of nature are more of a suggestion.",
      ];

      // Shuffle facts
      for (let i = FACTS.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [FACTS[i], FACTS[j]] = [FACTS[j], FACTS[i]];
      }
      let idx = 0;

      function showToast() {
        const toast = document.createElement('div');
        toast.className = 'cheese-toast';
        toast.innerHTML = `
          <span class="cheese-toast-icon">🧀</span>
          <p class="cheese-toast-text">${FACTS[idx++ % FACTS.length]}</p>
          <button class="cheese-toast-close" aria-label="Dismiss">✕</button>
        `;
        document.body.appendChild(toast);

        requestAnimationFrame(() => requestAnimationFrame(() => toast.classList.add('cheese-toast--visible')));

        let gone = false;
        function dismiss() {
          if (gone) return;
          gone = true;
          toast.classList.remove('cheese-toast--visible');
          setTimeout(() => toast.remove(), 420);
        }

        toast.querySelector('.cheese-toast-close').addEventListener('click', dismiss);
        setTimeout(dismiss, 8000);
        setTimeout(showToast, 20000 + Math.random() * 15000);
      }

      setTimeout(showToast, 3000 + Math.random() * 1000);
    })();
  </script>
</body>
</html>
