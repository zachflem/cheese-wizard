<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cheese Wizard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <img
      src="images/hero.png"
      alt="Cheese Wizard"
    />
  </main>

  <!-- Cheese trail follows the cursor -->
  <script>
    const CHEESES = ['🧀', '🧀', '🧀', '🫕', '🍕'];
    let lastX = null, lastY = null;

    document.addEventListener('mousemove', (e) => {
      const dx = lastX !== null ? Math.abs(e.clientX - lastX) : 999;
      const dy = lastY !== null ? Math.abs(e.clientY - lastY) : 999;
      if (dx < 12 && dy < 12) return;

      lastX = e.clientX;
      lastY = e.clientY;

      const el = document.createElement('span');
      el.className = 'cheese-crumb';
      el.textContent = CHEESES[Math.floor(Math.random() * CHEESES.length)];

      const size = 14 + Math.random() * 18;
      const driftX = (Math.random() - 0.5) * 30;
      const rotation = (Math.random() - 0.5) * 60;

      el.style.cssText = `
        left: ${e.clientX}px;
        top: ${e.clientY}px;
        font-size: ${size}px;
        --drift-x: ${driftX}px;
        --rotation: ${rotation}deg;
      `;

      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    });
  </script>

  <!-- Mouse peeks out of a random hole, looks around, disappears, repeats -->
  <script>
    (function () {
      const DURATION = 3500;
      const MIN_GAP  = 3000;
      const MAX_GAP  = 6000;

      function peek() {
        const margin = 60;
        const x = margin + Math.random() * (window.innerWidth  - margin * 2);
        const y = margin + Math.random() * (window.innerHeight - margin * 2);
        const r = () => (38 + Math.random() * 24) | 0;

        const hole = document.createElement('div');
        hole.className = 'peek-hole';
        hole.style.cssText = `left:${x}px; top:${y}px;
          border-radius:${r()}% ${r()}% ${r()}% ${r()}% / ${r()}% ${r()}% ${r()}% ${r()}%;`;
        document.body.appendChild(hole);

        const mouse = document.createElement('div');
        mouse.className = 'peek-mouse';
        mouse.textContent = '🐭';
        const fontSize = 44 + Math.random() * 44; // 44px–88px (2×–4× the original 22px)
        mouse.style.cssText = `left:${x}px; top:${y}px; font-size:${fontSize}px;`;
        document.body.appendChild(mouse);

        setTimeout(() => { hole.remove(); mouse.remove(); }, DURATION + 100);
        setTimeout(peek, DURATION + MIN_GAP + Math.random() * (MAX_GAP - MIN_GAP));
      }

      setTimeout(peek, 1200);
    })();
  </script>
</body>
</html>
