<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cheese Wizard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <img
      src="images/hero.png"
      alt="Cheese Wizard"
    />
  </main>
  <script>
    const CHEESES = ['🧀', '🧀', '🧀', '🫕', '🍕'];
    let lastX = null, lastY = null;

    document.addEventListener('mousemove', (e) => {
      const dx = lastX !== null ? Math.abs(e.clientX - lastX) : 999;
      const dy = lastY !== null ? Math.abs(e.clientY - lastY) : 999;
      if (dx < 12 && dy < 12) return;

      lastX = e.clientX;
      lastY = e.clientY;

      const el = document.createElement('span');
      el.className = 'cheese-crumb';
      el.textContent = CHEESES[Math.floor(Math.random() * CHEESES.length)];

      const size = 14 + Math.random() * 18;
      const driftX = (Math.random() - 0.5) * 30;
      const rotation = (Math.random() - 0.5) * 60;

      el.style.cssText = `
        left: ${e.clientX}px;
        top: ${e.clientY}px;
        font-size: ${size}px;
        --drift-x: ${driftX}px;
        --rotation: ${rotation}deg;
      `;

      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    });
  </script>
  <script>
    (function () {
      document.body.style.cursor = 'none';

      const wizMouse = document.createElement('div');
      wizMouse.id = 'wiz-mouse';
      wizMouse.textContent = '🐭';
      document.body.appendChild(wizMouse);

      let targetX = window.innerWidth / 2, targetY = window.innerHeight / 2;
      let posX = targetX, posY = targetY;
      let velX = 0, velY = 0;
      let prevX = posX, prevY = posY;
      let distSinceHole = 999;

      document.addEventListener('mousemove', e => {
        targetX = e.clientX;
        targetY = e.clientY;
      });

      function spawnHole(x, y) {
        const hole = document.createElement('div');
        hole.className = 'chew-hole';
        const size = 18 + Math.random() * 22;
        const r = () => (35 + Math.random() * 30) | 0;
        hole.style.cssText = `
          left: ${x}px; top: ${y}px;
          width: ${size}px; height: ${size}px;
          border-radius: ${r()}% ${r()}% ${r()}% ${r()}% / ${r()}% ${r()}% ${r()}% ${r()}%;
        `;
        document.body.appendChild(hole);
        setTimeout(() => {
          hole.style.transition = 'opacity 2s ease';
          hole.style.opacity = '0';
          setTimeout(() => hole.remove(), 2000);
        }, 13000);
      }

      function tick() {
        velX = velX * 0.76 + (targetX - posX) * 0.13;
        velY = velY * 0.76 + (targetY - posY) * 0.13;
        posX += velX;
        posY += velY;

        const speed  = Math.sqrt(velX * velX + velY * velY);
        const flip   = velX >= 0 ? 1 : -1;
        const tilt   = Math.max(-25, Math.min(25, velY * 2));
        const scale  = 1 + Math.min(speed / 80, 0.3);

        wizMouse.style.cssText = `
          left: ${posX}px; top: ${posY}px; font-size: 24px;
          transform: translate(-50%,-50%) scaleX(${flip}) rotate(${tilt}deg) scale(${scale});
        `;

        const dx = posX - prevX, dy = posY - prevY;
        distSinceHole += Math.sqrt(dx * dx + dy * dy);
        if (distSinceHole >= 75) { spawnHole(posX, posY); distSinceHole = 0; }
        prevX = posX; prevY = posY;

        requestAnimationFrame(tick);
      }

      tick();
    })();
  </script>
</body>
</html>
