<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cheese Wizard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <img
      src="images/hero.png"
      alt="Cheese Wizard"
    />
  </main>

  <!-- Cheese trail follows the cursor -->
  <script>
    const CHEESES = ['🧀', '🧀', '🧀', '🫕', '🍕'];
    let lastX = null, lastY = null;

    document.addEventListener('mousemove', (e) => {
      const dx = lastX !== null ? Math.abs(e.clientX - lastX) : 999;
      const dy = lastY !== null ? Math.abs(e.clientY - lastY) : 999;
      if (dx < 24 && dy < 24) return;

      lastX = e.clientX;
      lastY = e.clientY;

      const el = document.createElement('span');
      el.className = 'cheese-crumb';
      el.textContent = CHEESES[Math.floor(Math.random() * CHEESES.length)];

      const size = 14 + Math.random() * 18;
      const driftX = (Math.random() - 0.5) * 30;
      const rotation = (Math.random() - 0.5) * 60;

      el.style.cssText = `
        left: ${e.clientX}px;
        top: ${e.clientY}px;
        font-size: ${size}px;
        --drift-x: ${driftX}px;
        --rotation: ${rotation}deg;
      `;

      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    });
  </script>

  <!-- Mouse peeks out of a random hole, looks around, disappears, repeats -->
  <script>
    (function () {
      const DURATION = 3500;
      const MIN_GAP  = 3000;
      const MAX_GAP  = 6000;
      let peekTimer  = null;

      function schedule(delay) {
        clearTimeout(peekTimer);
        peekTimer = setTimeout(peek, delay);
      }

      function swipeNet(x, y) {
        const net = document.createElement('div');
        net.className = 'swipe-net';
        net.innerHTML = '<div class="swipe-net-mesh"></div><div class="swipe-net-handle"></div>';
        const dir = Math.random() > 0.5 ? 1 : -1;
        net.style.cssText = `left:${x}px; top:${y}px; --dir:${dir};`;
        document.body.appendChild(net);
        setTimeout(() => net.remove(), 700);
      }

      function peek() {
        const margin = 60;
        const x = margin + Math.random() * (window.innerWidth  - margin * 2);
        const y = margin + Math.random() * (window.innerHeight - margin * 2);
        const r = () => (38 + Math.random() * 24) | 0;

        const hole = document.createElement('div');
        hole.className = 'peek-hole';
        hole.style.cssText = `left:${x}px; top:${y}px;
          border-radius:${r()}% ${r()}% ${r()}% ${r()}% / ${r()}% ${r()}% ${r()}% ${r()}%;`;
        document.body.appendChild(hole);

        const fontSize = 44 + Math.random() * 44;
        const mouse = document.createElement('div');
        mouse.className = 'peek-mouse';
        mouse.textContent = '🐭';
        mouse.style.cssText = `left:${x}px; top:${y}px; font-size:${fontSize}px;`;
        document.body.appendChild(mouse);

        let done = false;
        const autoCleanup = setTimeout(() => {
          done = true;
          hole.remove();
          mouse.remove();
          schedule(MIN_GAP + Math.random() * (MAX_GAP - MIN_GAP));
        }, DURATION + 100);

        mouse.addEventListener('click', () => {
          if (done) return;
          done = true;
          clearTimeout(autoCleanup);

          swipeNet(x, y);

          // Mouse ducks away scared
          mouse.style.transition = 'opacity 0.2s ease';
          hole.style.transition  = 'opacity 0.25s ease';
          mouse.style.opacity = '0';
          hole.style.opacity  = '0';
          setTimeout(() => { mouse.remove(); hole.remove(); }, 300);

          // Spooked but curious — reappears sooner
          schedule(1200 + Math.random() * 1500);
        });
      }

      schedule(1200);
    })();
  </script>
  <!-- Stink wafts rise from the hero image -->
  <script>
    (function () {
      function spawnWaft() {
        const img = document.querySelector('main img');
        if (!img) return;
        const rect = img.getBoundingClientRect();
        const x    = rect.left + rect.width  * (0.25 + Math.random() * 0.5);
        const yBase = rect.top + rect.height * 0.18;
        const rise  = 70 + Math.random() * 60;
        const dur   = 2200 + Math.random() * 1000;

        const ns  = 'http://www.w3.org/2000/svg';
        const svg = document.createElementNS(ns, 'svg');
        const W = 18;
        svg.setAttribute('width',   W);
        svg.setAttribute('height',  rise);
        svg.setAttribute('viewBox', `0 0 ${W} ${rise}`);
        svg.style.cssText = `position:fixed;left:${x - W/2}px;top:${yBase - rise}px;pointer-events:none;z-index:500;`;

        const path = document.createElementNS(ns, 'path');
        const H = rise;
        path.setAttribute('d', `M9,${H} C15,${H*.8} 3,${H*.6} 9,${H*.4} C15,${H*.2} 3,0 9,0`);
        path.setAttribute('stroke', `hsla(${44 + Math.random()*18|0},75%,58%,0.6)`);
        path.setAttribute('stroke-width', '2.5');
        path.setAttribute('fill', 'none');
        path.setAttribute('stroke-linecap', 'round');
        svg.appendChild(path);
        document.body.appendChild(svg);

        svg.animate(
          [
            { opacity: 0,   transform: 'translateY(0px)' },
            { opacity: 0.75, transform: `translateY(-${rise * 0.15}px)`, offset: 0.15 },
            { opacity: 0.6,  transform: `translateY(-${rise * 0.65}px)`, offset: 0.75 },
            { opacity: 0,   transform: `translateY(-${rise}px)` }
          ],
          { duration: dur, easing: 'linear', fill: 'forwards' }
        ).finished.then(() => svg.remove());
      }

      function loop() {
        spawnWaft();
        if (Math.random() > 0.45) setTimeout(spawnWaft, 350 + Math.random() * 350);
        setTimeout(loop, 1800 + Math.random() * 1400);
      }

      const img = document.querySelector('main img');
      const start = () => setTimeout(loop, 600);
      img.complete ? start() : img.addEventListener('load', start);
    })();
  </script>

  <!-- Cheese constellation appears on idle -->
  <script>
    (function () {
      // "Caseius Major" — positions as fractions of viewport
      const STARS = [
        [0.10, 0.16], [0.16, 0.10], [0.23, 0.13], [0.20, 0.20], // bowl
        [0.30, 0.17], [0.38, 0.11], [0.46, 0.07],                // handle
      ];
      // Connections: bowl quad + handle
      const LINES = [[0,1],[1,2],[2,3],[3,0],[3,4],[4,5],[5,6]];

      let idleTimer    = null;
      let active       = null;

      document.addEventListener('mousemove', () => {
        clearTimeout(idleTimer);
        if (active) { scatter(); }
        idleTimer = setTimeout(show, 4000);
      });
      idleTimer = setTimeout(show, 5500);

      function show() {
        if (active) return;
        const container = document.createElement('div');
        container.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:300;';

        const ns  = 'http://www.w3.org/2000/svg';
        const svg = document.createElementNS(ns, 'svg');
        svg.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;';

        const pts = STARS.map(([fx, fy]) => [fx * window.innerWidth, fy * window.innerHeight]);

        LINES.forEach(([a, b]) => {
          const line = document.createElementNS(ns, 'line');
          line.setAttribute('x1', pts[a][0]); line.setAttribute('y1', pts[a][1]);
          line.setAttribute('x2', pts[b][0]); line.setAttribute('y2', pts[b][1]);
          line.setAttribute('stroke', 'rgba(255,215,60,0.2)');
          line.setAttribute('stroke-width', '1');
          svg.appendChild(line);
        });
        container.appendChild(svg);

        const starEls = pts.map(([x, y]) => {
          const el = document.createElement('div');
          el.className = 'constellation-star';
          el.textContent = '🧀';
          el.style.cssText = `left:${x}px;top:${y}px;`;
          container.appendChild(el);
          return el;
        });

        // Label
        const label = document.createElement('div');
        label.className = 'constellation-label';
        label.textContent = 'Caseius Major';
        label.style.cssText = `left:${pts[6][0] + 12}px;top:${pts[6][1] - 6}px;`;
        container.appendChild(label);

        document.body.appendChild(container);
        container.animate([{opacity:0},{opacity:1}], {duration:1800, fill:'forwards'});

        active = { container, starEls };
      }

      function scatter() {
        if (!active) return;
        const { container, starEls } = active;
        active = null;
        starEls.forEach(el => {
          const dx = (Math.random() - 0.5) * 400;
          const dy = (Math.random() - 0.5) * 400;
          el.animate(
            [
              { transform: 'translate(-50%,-50%) scale(1)', opacity: 1 },
              { transform: `translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px)) scale(0)`, opacity: 0 }
            ],
            { duration: 700, easing: 'ease-in', fill: 'forwards' }
          );
        });
        container.animate([{opacity:1},{opacity:0}], {duration:700, fill:'forwards'})
          .finished.then(() => container.remove());
      }
    })();
  </script>
</body>
</html>
