<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cheese Wizard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <img
      src="images/hero.png"
      alt="Cheese Wizard"
    />
  </main>

  <!-- Cheese trail follows the cursor (mouse-only devices) -->
  <script>
    if (window.matchMedia('(hover: hover) and (pointer: fine)').matches) {
    const CHEESES = ['🧀', '🧀', '🧀', '🫕', '🍕'];
    let lastX = null, lastY = null;

    document.addEventListener('mousemove', (e) => {
      const dx = lastX !== null ? Math.abs(e.clientX - lastX) : 999;
      const dy = lastY !== null ? Math.abs(e.clientY - lastY) : 999;
      if (dx < 24 && dy < 24) return;

      lastX = e.clientX;
      lastY = e.clientY;

      const el = document.createElement('span');
      el.className = 'cheese-crumb';
      el.textContent = CHEESES[Math.floor(Math.random() * CHEESES.length)];

      const size = 14 + Math.random() * 18;
      const driftX = (Math.random() - 0.5) * 30;
      const rotation = (Math.random() - 0.5) * 60;

      el.style.cssText = `
        left: ${e.clientX}px;
        top: ${e.clientY}px;
        font-size: ${size}px;
        --drift-x: ${driftX}px;
        --rotation: ${rotation}deg;
      `;

      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    });
    } // end hover check
  </script>

  <!-- Peeking mouse game -->
  <script>
    (function () {

      // ── Game state ──────────────────────────────────────────────────
      const G = { state: 'idle', score: 0, level: 0, timeLeft: 60 };
      let peekTimer = null, tickTimer = null;

      // Speed scales with level — faster and more frequent each hit (game only)
      function dur()    { return Math.max(700,  2000 - G.level *  80); }
      function minGap() { return G.state === 'playing' ? Math.max(300,  600 - G.level * 30) : 3000; }
      function maxGap() { return G.state === 'playing' ? Math.max(700, 1400 - G.level * 60) : 5500; }

      // ── Peek mechanic ───────────────────────────────────────────────
      function schedule(delay) {
        clearTimeout(peekTimer);
        peekTimer = setTimeout(peek, delay);
      }

      function swipeNet(x, y) {
        const net = document.createElement('div');
        net.className = 'swipe-net';
        net.innerHTML = '<div class="swipe-net-mesh"></div><div class="swipe-net-handle"></div>';
        const dir = Math.random() > 0.5 ? 1 : -1;
        net.style.cssText = `left:${x}px; top:${y}px; --dir:${dir};`;
        document.body.appendChild(net);
        setTimeout(() => net.remove(), 700);
      }

      function peek() {
        if (G.state === 'entry' || G.state === 'board') return;

        const vw = window.innerWidth, vh = window.innerHeight;
        const padX = vw * 0.05, padY = vh * 0.05;
        const x = padX + Math.random() * (vw - padX * 2);
        const y = padY + Math.random() * (vh - padY * 2);
        const r = () => (38 + Math.random() * 24) | 0;
        const d = dur();

        const hole = document.createElement('div');
        hole.className = 'peek-hole';
        hole.style.cssText = `left:${x}px; top:${y}px; --anim-dur:${d / 1000}s;
          border-radius:${r()}% ${r()}% ${r()}% ${r()}% / ${r()}% ${r()}% ${r()}% ${r()}%;`;
        document.body.appendChild(hole);

        const mouse = document.createElement('div');
        mouse.className = 'peek-mouse';
        mouse.textContent = '🐭';
        mouse.style.cssText = `left:${x}px; top:${y}px; font-size:${44 + Math.random() * 44}px; --anim-dur:${d / 1000}s;`;
        document.body.appendChild(mouse);

        let done = false;

        const autoCleanup = setTimeout(() => {
          done = true;
          hole.remove();
          mouse.remove();
          schedule(minGap() + Math.random() * (maxGap() - minGap()));
        }, d + 100);

        mouse.addEventListener('click', (e) => {
          if (done) return;
          done = true;
          clearTimeout(autoCleanup);
          e.stopPropagation(); // prevent miss detection firing

          swipeNet(x, y);
          mouse.style.transition = 'opacity 0.2s ease';
          hole.style.transition  = 'opacity 0.25s ease';
          mouse.style.opacity = '0';
          hole.style.opacity  = '0';
          setTimeout(() => { mouse.remove(); hole.remove(); }, 300);

          if (G.state === 'playing') {
            G.score += 3;
            G.level++;
            scoreFlash('+3', e.clientX, e.clientY, true);
            updateHUD();
          }

          // Spooked but curious — reappears sooner
          schedule(minGap() + Math.random() * (maxGap() - minGap()));
        });
      }

      // ── Score flash ─────────────────────────────────────────────────
      function scoreFlash(text, x, y, hit) {
        const el = document.createElement('div');
        el.className = 'game-score-flash ' + (hit ? 'game-score-flash--hit' : 'game-score-flash--miss');
        el.textContent = text;
        el.style.cssText = `left:${x}px; top:${y}px;`;
        document.body.appendChild(el);
        el.addEventListener('animationend', () => el.remove());
      }

      // ── HUD ─────────────────────────────────────────────────────────
      function updateHUD() {
        document.getElementById('hud-score').textContent = G.score;
        document.getElementById('hud-time').textContent  = G.timeLeft;
        document.getElementById('hud-level').textContent = G.level + 1;
      }

      // ── Game lifecycle ───────────────────────────────────────────────
      function startGame() {
        G.state = 'playing';
        G.score = 0;
        G.level = 0;
        G.timeLeft = 60;

        document.getElementById('game-overlay').classList.add('game-overlay--hidden');
        document.getElementById('game-hud').classList.remove('game-hud--hidden');
        updateHUD();

        clearInterval(tickTimer);
        tickTimer = setInterval(() => {
          G.timeLeft--;
          updateHUD();
          if (G.timeLeft <= 0) { clearInterval(tickTimer); endGame(); }
        }, 1000);

        schedule(300 + Math.random() * 500);
      }

      function endGame() {
        G.state = 'entry';
        clearTimeout(peekTimer);
        document.querySelectorAll('.peek-mouse, .peek-hole').forEach(el => el.remove());
        document.getElementById('game-hud').classList.add('game-hud--hidden');
        showNameEntry();
      }

      // ── Miss detection ───────────────────────────────────────────────
      document.addEventListener('click', (e) => {
        if (G.state !== 'playing') return;
        if (e.target.closest('.peek-mouse')) return;
        if (e.target.closest('#game-hud')) return;

        const img  = document.querySelector('main img');
        const rect = img.getBoundingClientRect();
        if (e.clientX < rect.left || e.clientX > rect.right ||
            e.clientY < rect.top  || e.clientY > rect.bottom) return;

        G.score -= 5;
        scoreFlash('-5', e.clientX, e.clientY, false);
        updateHUD();
      });

      // ── Leaderboard ──────────────────────────────────────────────────
      const LB = {
        get() {
          try { return JSON.parse(localStorage.getItem('cwLB') || '[]'); } catch { return []; }
        },
        add(name, score) {
          const entries = this.get();
          const entry = {
            name,
            score,
            date: new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: '2-digit' })
          };
          entries.push(entry);
          entries.sort((a, b) => b.score - a.score);
          const idx = entries.indexOf(entry);
          if (entries.length > 10) entries.length = 10;
          localStorage.setItem('cwLB', JSON.stringify(entries));
          return { entries, idx: idx < 10 ? idx : -1 };
        }
      };

      // ── Name entry ────────────────────────────────────────────────────
      function showNameEntry() {
        const overlay = document.getElementById('game-overlay');
        const card    = overlay.querySelector('.game-card');
        overlay.classList.remove('game-overlay--hidden');

        card.innerHTML = `
          <div class="game-name-header">
            <div class="game-final-score">FINAL SCORE: ${G.score}</div>
            <div class="game-name-title">ENTER YOUR NAME</div>
          </div>
          <div class="game-name-slots" id="name-slots"></div>
          <div class="game-name-hint">TYPE 5 CHARACTERS &nbsp;•&nbsp; BACKSPACE TO DELETE</div>
          <button class="game-btn game-btn--dim" id="name-submit" disabled>SUBMIT</button>
        `;

        // Hidden input captures keyboard on both desktop and mobile
        const input = document.createElement('input');
        input.setAttribute('maxlength', '5');
        input.setAttribute('autocomplete', 'off');
        input.setAttribute('autocorrect', 'off');
        input.setAttribute('autocapitalize', 'characters');
        input.style.cssText = 'position:fixed;opacity:0;top:0;left:0;width:1px;height:1px;pointer-events:none;';
        card.appendChild(input);
        requestAnimationFrame(() => input.focus());

        // Re-focus if user taps elsewhere on the card
        card.addEventListener('click', () => input.focus());

        function renderSlots(val) {
          const slots = Array.from({ length: 5 }, (_, i) => val[i] || '_');
          const cur   = Math.min(val.length, 4);
          document.getElementById('name-slots').innerHTML = slots.map((c, i) =>
            `<div class="game-name-slot${(i === cur && val.length < 5) ? ' game-name-slot--active' : ''}">${c}</div>`
          ).join('');
          const filled = val.length === 5;
          const btn = document.getElementById('name-submit');
          btn.disabled = !filled;
          btn.className = 'game-btn' + (filled ? '' : ' game-btn--dim');
        }

        renderSlots('');

        input.addEventListener('input', () => {
          const val = input.value.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 5);
          input.value = val;
          renderSlots(val);
        });

        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' && input.value.length === 5) submit();
        });

        document.getElementById('name-submit').addEventListener('click', submit);

        function submit() {
          const name = input.value.padEnd(5, ' ');
          const { entries, idx } = LB.add(name, G.score);
          G.state = 'board';
          showLeaderboard(entries, idx, card);
        }
      }

      // ── Leaderboard display ───────────────────────────────────────────
      function showLeaderboard(entries, newIdx, card) {
        const empty = '<tr><td colspan="4" style="opacity:0.35;text-align:center;padding:16px;">— no scores yet —</td></tr>';
        card.innerHTML = `
          <div class="game-lb-title">🏆 TOP HUNTERS 🏆</div>
          <table class="game-lb-table">
            <thead><tr><th>#</th><th>NAME</th><th>SCORE</th><th>DATE</th></tr></thead>
            <tbody>${entries.length ? entries.map((e, i) =>
              `<tr class="${i === newIdx ? 'game-lb-new' : ''}">
                <td>${i + 1}</td>
                <td>${e.name}</td>
                <td>${e.score}</td>
                <td>${e.date}</td>
              </tr>`
            ).join('') : empty}</tbody>
          </table>
          <div class="game-lb-actions">
            <button class="game-btn" id="play-again-btn">PLAY AGAIN</button>
            <button class="game-btn game-btn--ghost" id="close-lb-btn">CLOSE</button>
          </div>
        `;

        document.getElementById('play-again-btn').addEventListener('click', () => {
          G.state = 'idle';
          showStartCard(card);
          schedule(1500 + Math.random() * 1500);
        });

        document.getElementById('close-lb-btn').addEventListener('click', () => {
          G.state = 'idle';
          document.getElementById('game-overlay').classList.add('game-overlay--hidden');
          schedule(1500 + Math.random() * 1500);
        });
      }

      // ── Start card ────────────────────────────────────────────────────
      function showStartCard(card) {
        card.innerHTML = `
          <div class="game-start-logo">🐭</div>
          <h2 class="game-start-title">MOUSE HUNT</h2>
          <div class="game-start-rules">
            <div class="game-rule game-rule--hit">HIT a mouse &nbsp;+3 pts</div>
            <div class="game-rule game-rule--miss">MISS a click &nbsp;−5 pts</div>
            <div class="game-start-sub">60 SECONDS &nbsp;•&nbsp; SPEED INCREASES EACH HIT</div>
          </div>
          <button class="game-btn" id="game-start-btn">PLAY GAME</button>
        `;
        document.getElementById('game-start-btn').addEventListener('click', startGame);
      }

      // ── Build UI ──────────────────────────────────────────────────────
      (function buildUI() {
        // Overlay — hidden until the red button is pressed
        const overlay = document.createElement('div');
        overlay.id = 'game-overlay';
        overlay.className = 'game-overlay game-overlay--hidden';
        overlay.innerHTML = '<div class="game-card"></div>';
        document.body.appendChild(overlay);
        showStartCard(overlay.querySelector('.game-card'));

        const hud = document.createElement('div');
        hud.id = 'game-hud';
        hud.className = 'game-hud game-hud--hidden';
        hud.innerHTML = `
          <div class="game-hud-item">SCORE <span id="hud-score">0</span></div>
          <div class="game-hud-item game-hud-timer"><span id="hud-time">60</span>s</div>
          <div class="game-hud-item game-hud-level">LV <span id="hud-level">1</span></div>
        `;
        document.body.appendChild(hud);

        // Invisible trigger positioned over the red button in the hero image
        // Button is at ~47% x, ~79% y of the image (the "DO NOT PRESS" button)
        const trigger = document.createElement('button');
        trigger.className = 'game-trigger';
        trigger.setAttribute('aria-label', 'Play Mouse Hunt');
        document.body.appendChild(trigger);

        function positionTrigger() {
          const img = document.querySelector('main img');
          if (!img || !img.naturalWidth) { setTimeout(positionTrigger, 100); return; }

          // With object-fit:cover the rendered image is larger than the element on
          // one axis — calculate where the actual image pixels land in the viewport.
          const el    = img.getBoundingClientRect();
          const scale = Math.max(el.width / img.naturalWidth, el.height / img.naturalHeight);
          const rw    = img.naturalWidth  * scale;
          const rh    = img.naturalHeight * scale;
          const ox    = el.left + (el.width  - rw) / 2;  // may be negative (cropped)
          const oy    = el.top  + (el.height - rh) / 2;

          // Red "DO NOT PRESS" button lives at ~46.9% x, ~79.3% y of the source image
          const cx   = ox + rw * 0.469;
          const cy   = oy + rh * 0.793;
          const size = Math.max(44, rh * 0.105);
          trigger.style.cssText = `left:${cx - size/2}px; top:${cy - size/2}px; width:${size}px; height:${size}px;`;
        }

        positionTrigger();
        window.addEventListener('resize', positionTrigger);

        trigger.addEventListener('click', () => {
          overlay.classList.remove('game-overlay--hidden');
        });
      })();

      // ── Start ambient peeking on start screen ─────────────────────────
      schedule(1200);

    })();
  </script>
  <!-- Toasted cheese facts -->
  <script>
    (function () {
      const FACTS = [
        "Cheese is the most stolen food in the world. 4% of all cheese produced globally is stolen each year. Cheese criminals walk among us.",
        "Casu martzu is a Sardinian cheese intentionally infested with live maggots. The maggots can jump 6 inches when disturbed. It is technically illegal. It is also considered a delicacy.",
        "A 3,200-year-old cheese was discovered in an Egyptian tomb in 2018. Scientists confirmed it was once edible. They did not confirm whether anyone tried it.",
        "Mice don't actually prefer cheese. Studies show they prefer sweet foods. Every cartoon has lied to you.",
        "The holes in Swiss cheese are officially called 'eyes.' Swiss cheese with no holes is called 'blind cheese.' This feels deeply ominous.",
        "An Italian bank — Credito Emiliano — accepts wheels of Parmigiano-Reggiano as loan collateral. They store thousands of wheels in climate-controlled vaults. Cheese heists have been attempted.",
        "Casein, a protein in cheese, breaks down into compounds that bind to the same opioid receptors as morphine. Cheese is, very mildly, a drug.",
        "Époisses de Bourgogne is so powerfully pungent it is banned on French public transportation. Napoleon Bonaparte was reportedly obsessed with it.",
        "France has over 1,600 varieties of cheese. De Gaulle once asked, 'How can you govern a country with 246 kinds of cheese?' The number has since grown considerably.",
        "Kraft Singles cannot legally be called 'cheese.' They must be labeled 'pasteurized prepared cheese product.' There is an entire regulatory category for things pretending to be cheese.",
        "The phrase 'the moon is made of green cheese' dates to 1546. 'Green' meant 'fresh' — not the color. This is still incorrect but slightly less absurd.",
        "Turophobia is the documented fear of cheese. Symptoms include anxiety around cheese boards and an inability to enjoy fondue.",
        "Swiss cheese holes have been shrinking since the 1950s. Scientists found they were caused by tiny hay particles falling into milk. Modern hygienic dairy practices removed the hay. Cleaner barns = fewer holes. Progress is complicated.",
        "The British Cheese Board conducted a study finding cheese before bed causes vivid and unusual dreams. Blue cheese produced the most bizarre results. This was real peer-reviewed research.",
        "The word 'salary' derives from Latin for salt payment — Romans were paid partly in salt. Cheese was also distributed as rations but left absolutely no linguistic legacy. The greatest injustice in etymology.",
        "Swiss cheese fondue was not a folk tradition. It was invented as a 1930s marketing campaign by the Swiss Cheese Union to sell more cheese. It worked flawlessly.",
        "The Swiss Cheese Union later became one of history's strangest financial scandals — embezzling millions to fund lavish global 'cheese diplomacy' parties for politicians throughout the 1980s. Multiple executives were imprisoned.",
        "Babybel wax is food-safe and entirely edible. The company confirmed this when enough people asked. What you do with this information is between you and your conscience.",
        "Natural cheddar is white. The orange color is artificial dye added since the 17th century to signal higher butterfat content. The tradition outlived its meaning. You have been eating dyed cheese your whole life.",
        "The bacteria responsible for Limburger's infamous smell — Brevibacterium linens — is the same species responsible for human foot odor. They are literally the same microorganism. You're welcome.",
        "String cheese is mozzarella heated to exactly 140°F, aligning its proteins into parallel strands. Biting it instead of peeling it is technically incorrect. There is no law against this.",
        "Every year, people chase a wheel of Double Gloucester down a near-vertical hill in Cooper's Hill, England. The cheese reaches ~70 mph. No human has ever kept pace. The cheese always wins.",
        "An aged wheel of Parmigiano-Reggiano can cost over $1,000. The rind is edible and traditionally added to Italian soups. Italians will silently respect you if you eat it plain.",
        "It takes roughly 10 lbs of milk to produce 1 lb of cheese. A single wheel of Parmigiano-Reggiano requires the equivalent of one cow's annual milk output. Parmigiano does not cut corners.",
        "The record for the world's longest grilled cheese sandwich is 53.8 meters, set in 2014. It required 25 lbs of cheese. It was consumed afterward. As it should be.",
        "Cheese was used as currency in 14th-century France. Tax collectors in some regions accepted it in lieu of coin. Camembert has never been this powerful since.",
        "The smell of aged cheese activates the same brain reward centers as financial gain. Your brain cannot meaningfully distinguish between smelling Gruyère and winning money. Invest accordingly.",
        "Roquefort-sur-Soulzon, population ~600, produces roughly 3 million wheels of Roquefort per year. That is approximately 5,000 wheels per resident. Every person in that village is, statistically, mostly cheese.",
        "There is a competitive cheese-carving circuit in which artists sculpt elaborate scenes from giant blocks of cheddar. Past subjects include the Sistine Chapel and a full-size Ford pickup truck. Both were eventually eaten.",
        "Cheese is the only food in many countries legally labeled 'natural' while containing artificial coloring. It exists in a special regulatory dimension where the rules of nature are more of a suggestion.",
      ];

      // Shuffle facts
      for (let i = FACTS.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [FACTS[i], FACTS[j]] = [FACTS[j], FACTS[i]];
      }
      let idx = 0;

      function showToast() {
        const toast = document.createElement('div');
        toast.className = 'cheese-toast';
        toast.innerHTML = `
          <img class="cheese-toast-bg" src="images/toast.png" alt="">
          <p class="cheese-toast-text">${FACTS[idx++ % FACTS.length]}</p>
          <button class="cheese-toast-close" aria-label="Dismiss">✕</button>
        `;
        document.body.appendChild(toast);

        requestAnimationFrame(() => requestAnimationFrame(() => toast.classList.add('cheese-toast--visible')));

        let gone = false;
        function dismiss() {
          if (gone) return;
          gone = true;
          toast.classList.remove('cheese-toast--visible');
          setTimeout(() => toast.remove(), 420);
        }

        toast.querySelector('.cheese-toast-close').addEventListener('click', dismiss);
        setTimeout(dismiss, 8000);
        setTimeout(showToast, 20000 + Math.random() * 15000);
      }

      setTimeout(showToast, 3000 + Math.random() * 1000);
    })();
  </script>
</body>
</html>
